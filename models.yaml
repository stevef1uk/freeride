# Freeride Model Configuration

# Priority 1: Verified working free/paid models (OpenRouter)
reliableFree:
  - "openai/gpt-4o-mini"
  - "google/gemini-2.0-flash-001"
  - "meta-llama/llama-3.3-70b-instruct"

# Priority 2: Reliable NVIDIA models (zero-cost, high performance)
nvidiaReliable:
  - "meta/llama-3.3-70b-instruct"
  - "meta/llama-3.2-11b-vision-instruct"

# Models to exclude (broken, deprecated, or rate-limited)
excludeModels:
  - "google/gemma-4-26b-a4b-it:free"      # Currently broken 401
  - "google/gemini-2.0-flash-exp:free"    # 404 Not Found
  - "deepseek/deepseek-v3:free"           # 400 Invalid model ID
  - "nvidia/llama-3.1-70b-instruct"       # 404 Not Found
  - "anthropic/claude-3.5-sonnet"         # 404 Not Found on OpenRouter
  - "meta-llama/llama-3.3-70b-instruct:free"  # 429 Rate Limited

# Notes:
# - With OpenRouter credits, paid models work reliably (gpt-4o-mini, gemini-2.0-flash-001)
# - NVIDIA models are always free and don't require credits
# - Free models on OpenRouter often hit rate limits (429)
# - Run with --allow-paid flag to enable paid model fallbacks
