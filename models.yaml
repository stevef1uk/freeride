# Roles that must use "massive" models (70b+ heuristics in Go) — not model IDs.
massiveOnlyRoles:
  - architect
  - mayor
  - planner
  - polecat

# Extra candidates prepended for a role when --allow-paid (e.g. polecat coding)
rolePrepend:
  polecat:
    - "anthropic/claude-3.5-sonnet"
  planner:
    - "anthropic/claude-3.5-sonnet"
  architect:
    - "anthropic/claude-3.5-sonnet"

# OpenRouter free-model ranking boosts (substring match on model id)
freeModelScoreBoost:
  - pattern: "gemini-2.0-flash-exp"
    boost: 10.0
  - pattern: "mistral-7b-instruct"
    boost: 1.0

trustedScoringNames:
  - google
  - meta
  - nvidia
  - mistral
  - anthropic
  - openai
  - microsoft
  - qwen
  - deepseek

# Shown on /v1/models for clients that probe before chat
compatModels:
  - id: claude-3-5-sonnet-20241022
    displayName: Claude 3.5 Sonnet
    ownedBy: anthropic
  - id: claude-3-5-sonnet
    displayName: Claude 3.5 Sonnet (Legacy)
    ownedBy: anthropic
  - id: gpt-4o
    displayName: GPT-4o
    ownedBy: openai
  - id: gpt-4
    displayName: GPT-4
    ownedBy: openai

defaultResponseModel: "gpt-4o"
anthropicResponseModel: "claude-3-5-sonnet-20241022"

# Priority 0.1: Free/Ultra-cheap Cerebras (High speed, zero/low cost)
cerebrasBudget:
  - "cerebras/llama3.1-8b"                   # $0.10/1M tokens
  - "cerebras/gpt-oss-120b"                  # Free (Preview)
  - "cerebras/qwen-3-235b-a22b-instruct-2507" # Free (Preview)

# Priority 0.5: Paid Cerebras Performance (Used for COMPLEX only)
cerebrasPerformance:
  - "cerebras/llama3.3-70b"                  # $0.85 (In) / $1.20 (Out) per 1M
  - "cerebras/llama3.1-70b"                  # $0.60/1M tokens

# Priority 1: Verified working free/paid models (OpenRouter)
reliableFree:
  - "nousresearch/hermes-3-llama-3.1-405b:free"
  - "qwen/qwen3-coder:free"
  - "meta-llama/llama-3.3-70b-instruct:free"

# Priority 2: Reliable NVIDIA NIM models (verified chat/completions 2026-05-17)
# 70b/nemotron-super for agents; 11b for lighter tasks.
nvidiaReliable:
  - "nvidia/llama-3.3-nemotron-super-49b-v1"
  - "nvidia/llama-3.3-nemotron-super-49b-v1.5"
  - "nvidia/nemotron-3-super-120b-a12b"
  - "meta/llama-3.3-70b-instruct"
  - "meta/llama-3.2-11b-vision-instruct"

# Priority 2.5: Complex-task NVIDIA models (always tried first for complex requests)
# These are only used when isComplex() detects tools, long context, or agent workflows.
nvidiaComplex:
  - "nvidia/llama-3.3-nemotron-super-49b-v1"
  - "nvidia/llama-3.3-nemotron-super-49b-v1.5"
  - "nvidia/nemotron-3-super-120b-a12b"
  - "meta/llama-3.3-70b-instruct"

# Models that should be tried even if they are paid (if --allow-paid is set)
curatedPaid:
  - "openai/gpt-4o-mini"                     # $0.15 (In) / $0.60 (Out) per 1M
  - "google/gemini-2.0-flash-001"            # $0.10 (In) / $0.40 (Out) per 1M
  - "anthropic/claude-3.5-sonnet"            # $3.00 (In) / $15.00 (Out) per 1M

# Models to exclude (broken, deprecated, or rate-limited)
excludeModels:
  - "google/gemma-4-26b-a4b-it:free"      # Currently broken 401
  - "deepseek/deepseek-v3:free"           # 400 Invalid model ID
  - "nvidia/llama-3.1-70b-instruct"       # 404 Not Found
  - "nvidia/llama-3.1-nemotron-70b-instruct"   # listed in /v1/models but chat 404
  - "nvidia/llama-3.1-nemotron-ultra-253b-v1"  # chat 404 for this account
  - "meta-llama/llama-3.2-1b-instruct:free" # TOO SMALL - Hallucinates
  - "meta-llama/llama-3.2-3b-instruct:free" # TOO SMALL - Hallucinates
  - "meta-llama/llama-3.2-1b-instruct"      # TOO SMALL
  - "meta-llama/llama-3.2-3b-instruct"      # TOO SMALL
  - "meta/llama-3.2-1b-instruct"            # NVIDIA VERSION - TOO SMALL
  - "meta/llama-3.2-3b-instruct"            # NVIDIA VERSION - TOO SMALL
  - "nvidia/llama-3.1-nemotron-nano-8b-v1"  # TOO SMALL
  - "nvidia/llama-3.1-nemotron-nano-vl-8b-v1" # TOO SMALL
  - "nvidia/nemotron-nano-12b-v2-vl"         # TOO SMALL
  - "nvidia/nemotron-mini-4b-instruct"      # TOO SMALL

# When local GPU is enabled (--allow-local-openai + localOpenAI below): skip weak cloud models;
# capable cloud is tried first; local llama-server is fallback only (end of candidate list).
blockSmallCloudWhenLocalGPU:
  models:
    - "cerebras/llama3.1-8b"
    - "nvidia/llama-3.1-nemotron-nano-8b-v1"
    - "nvidia/llama-3.1-nemotron-nano-vl-8b-v1"
    - "nvidia/nemotron-mini-4b-instruct"
    - "nvidia/nemotron-nano-12b-v2-vl"
    - "meta/llama-3.2-11b-vision-instruct"
    - "mistralai/mistral-nemotron"
  patterns:
    - "nano"
    - "mini"
    - "-8b"
    - "-11b"
    - "-12b"
    - "-1b"
    - "-3b"
    - "-4b"
    - "llama3.1-8b"

# Priority 3: Local IDE Models (Opt-in via --allow-ide)
ideModels:
  - id: "google-antigravity/gemini-3-flash"
    cooldown: "2h30m"
    endpoint: "http://localhost:50000"
  - id: "google-antigravity/claude-3-5-sonnet"
    cooldown: "72h"
    endpoint: "http://localhost:50000"
  - id: "opencode/openai/gpt-4o"
    cooldown: "24h"
    endpoint: "http://localhost:40000"

# Local llama-server. Requires: ./freeride --allow-local-openai
#
# Two names (not interchangeable):
#   id    — LLM_MODEL in ~/gt/settings/config.json (Freeride route name)
#   model — JSON "model" sent to llama-server (from: curl -s :8080/v1/models | jq -r '.data[0].id')
localOpenAI:
  - id: "local/qwen3-coder-30b"
    endpoint: "http://127.0.0.1:8080"
    model: "unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF"
    cooldown: "30m"

# Notes:
# - With OpenRouter credits, paid models work reliably (gpt-4o-mini, gemini-2.0-flash-001)
# - NVIDIA models are always free and don't require credits
# - Run with --allow-paid for paid fallbacks; --allow-local-openai for local fallback + weak-cloud block
